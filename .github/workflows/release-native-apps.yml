name: Release Native Apps

on:
  release:
    types: [published]

jobs:
  build-matrix:
    strategy:
      matrix:
        include:
          # ========== Linux x86_64 (Raylib Native) ==========
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            justfile-recipe: linux-raylib
            artifact-name: comboom-sucht-linux-x64
            archive-name: comboom-sucht-linux-x64.tar.gz

          # ========== Linux ARM64 (Raylib Native, Cross-Compile) ==========
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            justfile-recipe: linux-raylib-arm64
            artifact-name: comboom-sucht-linux-arm64
            archive-name: comboom-sucht-linux-arm64.tar.gz
            cross-compile: true

          # ========== Windows x86_64 (Raylib, cross-compiled from Linux) ==========
          - os: ubuntu-latest
            platform: windows
            arch: x86_64
            justfile-recipe: windows-raylib
            artifact-name: comboom-sucht-windows-x64.exe
            archive-name: comboom-sucht-windows-x64.zip

          # ========== Windows ARM64 (Raylib, cross-compiled from Linux) ==========
          - os: ubuntu-latest
            platform: windows
            arch: arm64
            justfile-recipe: windows-raylib-arm64
            artifact-name: comboom-sucht-windows-arm64.exe
            archive-name: comboom-sucht-windows-arm64.zip
            cross-compile: true

          # ========== macOS ARM64 (Native Metal Build) ==========
          # Note: Currently requires latest Xcode (26.4+)
          #- os: macos-latest
          #  platform: macos
          #  arch: arm64
          #  artifact-name: comboom.sucht Live Wallpaper.app
          #  archive-name: comboom-sucht-macos-arm64.zip

    name: "Build ${{ matrix.platform }}-${{ matrix.arch }}"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set version from release tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      # ============= Common: Setup Build Tools (Ubuntu) =============
      - name: Install build tools and Clang 18 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            lld-18 \
            just \
            pkg-config \
            git

          # Set Clang 18 as default
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-18 100

      # ============= Linux: Graphics & System Tray Libraries =============
      - name: Install Linux graphics and tray libraries
        if: runner.os == 'Linux' && matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libglu1-mesa-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libappindicator3-dev \
            libgtk-3-dev \
            libdbus-1-dev

      # ============= Linux ARM64 Cross-Compile: Install aarch64 toolchain =============
      - name: Install ARM64 cross-compile toolchain (Linux)
        if: runner.os == 'Linux' && matrix.cross-compile == true && matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      # ============= Windows MinGW Cross-Compile: Install llvm-mingw =============
      - name: Install LLVM-MinGW for Windows cross-compilation (Ubuntu)
        if: runner.os == 'Linux' && matrix.platform == 'windows'
        run: |
          # Download LLVM-MinGW (stable release)
          cd /tmp
          curl -L https://github.com/mstorsjo/llvm-mingw/releases/download/20250401/llvm-mingw-20250401-ucrt-ubuntu-20.04-x86_64.tar.xz -o llvm-mingw.tar.xz
          tar -xJ -f llvm-mingw.tar.xz
          sudo mv llvm-mingw-* /opt/llvm-mingw

          # Add to PATH
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

          # Verify installation
          x86_64-w64-mingw32-gcc --version
          aarch64-w64-mingw32-gcc --version

      # ============= Build Apps via Justfile =============
      - name: "Build ${{ matrix.platform }}-${{ matrix.arch }} (Raylib)"
        run: just ${{ matrix.justfile-recipe }}
        shell: bash

      # ============= Create Archives =============
      - name: Create Linux archive
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.archive-name }} \
            -C build ${{ matrix.artifact-name }}
          ls -lh dist/${{ matrix.archive-name }}
        shell: bash

      - name: Create Windows archive (ZIP)
        if: matrix.platform == 'windows'
        run: |
          mkdir -p dist
          cd build
          zip -j ../dist/${{ matrix.archive-name }} ${{ matrix.artifact-name }}
          cd ..
          ls -lh dist/${{ matrix.archive-name }}
        shell: bash

      # ============= Upload to Release =============
      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.archive-name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============= Generate Release Notes (once) =============
  release-notes:
    name: Create Release Notes
    runs-on: ubuntu-latest
    needs: build-matrix
    if: startsWith(github.ref, 'refs/tags/') && always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from release tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create comprehensive release notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          # comboom. sucht Native Wallpaper v${{ steps.version.outputs.VERSION }}

          Cross-platform particle wallpaper engine with native C++23 Raylib apps for Linux and Windows.

          ## 📦 Downloads by Platform & Architecture

          ### 🐧 Linux (Raylib + OpenGL 4.3)
          - **x86-64** (Intel/AMD): `comboom-sucht-linux-x64.tar.gz`
          - **ARM64** (ARMv8, Raspberry Pi): `comboom-sucht-linux-arm64.tar.gz`

          ### 🪟 Windows (Raylib + MinGW + OpenGL)
          - **x86-64** (Intel/AMD): `comboom-sucht-windows-x64.zip`
          - **ARM64** (Future ARM Windows): `comboom-sucht-windows-arm64.zip`

          ## 🚀 Quick Start

          ### Linux
          \`\`\`bash
          # Extract archive
          tar -xzf comboom-sucht-linux-x64.tar.gz

          # Run wallpaper
          ./comboom-sucht-linux-x64
          \`\`\`

          **Requirements**:
          - X11 or Wayland session
          - OpenGL 4.3 capable GPU
          - glibc 2.35+ (Ubuntu 22.04+, Debian 12+, Fedora 36+)

          ### Windows
          \`\`\`cmd
          # Extract zip
          tar -xf comboom-sucht-windows-x64.zip

          # Run app
          comboom-sucht-windows-x64.exe
          \`\`\`

          **Requirements**:
          - Windows 10 or later
          - OpenGL 4.3 capable GPU

          ## ✨ Features

          - 🎨 Particle-based animated wallpaper
          - 💻 Native applications:
            - **Linux**: Raylib with X11 & Wayland support, AppIndicator3 system tray
            - **Windows**: Raylib with MinGW, Win32 system tray
          - 🖱️ Real-time mouse interaction (magnetic particle attraction)
          - 📝 Custom text overlay (H1 header, H2 subtitle - via system tray)
          - 🎯 System tray integration
          - 📊 5000+ particles @ 60 FPS
          - 🌍 Multi-architecture support (x86-64, ARM64)
          - 🔗 Fully static linked - no runtime dependencies

          ## 🔄 Architecture Support

          | Platform | x86-64 | ARM64 | Graphics |
          |----------|--------|-------|----------|
          | Linux    | ✅     | ✅    | OpenGL 4.3 (Raylib) |
          | Windows  | ✅     | ✅    | OpenGL (MinGW) |

          ## 🛠️ Technical Stack

          - **Language**: C++23
          - **Graphics**: Raylib (OpenGL 4.3)
          - **Compiler**: Clang 18 (with cross-compilation support)
          - **Build System**: Justfile
          - **Asset Embedding**: C++23 \`#embed\` directive
          - **System Tray**:
            - Linux: AppIndicator3 + GTK
            - Windows: Win32 Shell API
          - **Linking**: Fully static (no external runtime dependencies)

          ## 📝 Build Information

          - **Release Tag**: v${{ steps.version.outputs.VERSION }}
          - **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Primary Compiler**: Clang 18
          - **C++ Standard**: C++23
          - **Total Builds**: 4 (Linux x64/ARM64, Windows x64/ARM64)

          ## 🚀 Cross-Platform Building

          All builds (including Windows) are cross-compiled from **Ubuntu Linux** using:
          - **Linux x86-64**: Native Clang
          - **Linux ARM64**: Clang with \`--target=aarch64-linux-gnu\`
          - **Windows x86-64**: LLVM-MinGW with \`--target=x86_64-w64-mingw32\`
          - **Windows ARM64**: LLVM-MinGW with \`--target=aarch64-w64-mingw32\`

          ## 📚 Documentation

          - **Build Guide**: See [RAYLIB_BUILD.md](RAYLIB_BUILD.md)
          - **Implementation Summary**: See [IMPLEMENTATION_SUMMARY.md](IMPLEMENTATION_SUMMARY.md)

          ---

          **Built with ❤️ using Raylib (C++23, cross-platform native rendering)**
          EOF

          cat /tmp/release_notes.md

      - name: Update release with comprehensive notes
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: /tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  # ============= Build Summary =============
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-matrix.result }}" == "success" ]; then
            echo "✅ All native builds completed successfully!"
            echo ""
            echo "📦 Built via Justfile (4 architectures, all cross-compiled from Ubuntu):"
            echo ""
            echo "  Linux:"
            echo "    • just linux-raylib     → comboom-sucht-linux-x64.tar.gz"
            echo "    • just linux-raylib-arm64 → comboom-sucht-linux-arm64.tar.gz"
            echo ""
            echo "  Windows (cross-compiled from Ubuntu via LLVM-MinGW):"
            echo "    • just windows-raylib     → comboom-sucht-windows-x64.zip"
            echo "    • just windows-raylib-arm64 → comboom-sucht-windows-arm64.zip"
            echo ""
            echo "🚀 Artifacts uploaded to GitHub Release"
          else
            echo "⚠️ Some builds may have failed. Check workflow logs."
          fi
